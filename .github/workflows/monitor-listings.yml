name: Monitor MFL Listings

on:
  schedule:
    # Runs every 5 minutes (GitHub's minimum)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run monitoring script (5 checks @ 60s intervals)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor_listings.py
      
      - name: Commit cache updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add notified_players.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update notified players cache [skip ci]"
          git push
        continue-on-error: true
